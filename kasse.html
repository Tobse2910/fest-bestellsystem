<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Straßenfest · Kasse</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .view{ height:100%; display:flex; min-width:0; }
  .cat-filter{
    flex-shrink:0; width:172px; padding:14px 12px; display:flex; flex-direction:column; gap:10px;
    background:linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
    border-right:2px solid rgba(255,197,41,.2); overflow-y:auto; min-height:0;
    -webkit-overflow-scrolling:touch;
  }
  .view{ min-height:0; }
  .cat-filter .cat-btn{
    flex-shrink:0; width:100%; padding:14px 12px; border:none; background:rgba(255,255,255,.06);
    color:var(--text); border-radius:12px; cursor:pointer; font-weight:700; font-size:14px;
    transition:all .25s cubic-bezier(.2,.7,.2,1); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.1); white-space:normal; text-align:center; line-height:1.2;
  }
  .cat-filter .cat-btn:hover{
    background:rgba(255,197,41,.15); border-color:var(--gold); transform:translateY(-2px);
    box-shadow:0 8px 16px rgba(255,197,41,.15);
  }
  .cat-filter .cat-btn.active{
    background:linear-gradient(135deg,var(--gold),var(--gold-2));
    color:var(--ink); border-color:var(--gold);
    box-shadow:0 8px 24px rgba(255,197,41,.32);
    transform:translateY(-2px);
  }

  /* Hamburger-Button für Kategorien – nur auf schmalen Screens sichtbar */
  .cat-ham{ display:none; }
  .cat-ham .ham-ic{ display:inline-flex; flex-direction:column; justify-content:center; gap:4px; width:22px; flex-shrink:0; }
  .cat-ham .ham-ic i{ display:block; width:100%; height:2.5px; border-radius:2px;
    background:linear-gradient(135deg,var(--gold),var(--gold-2)); }

  .menu{
    flex:1; min-width:0; padding:22px;
    display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); grid-auto-rows:minmax(150px,1fr); gap:16px;
    overflow-y:auto;
  }
  .drink{
    position:relative; overflow:hidden;
    display:flex; flex-direction:column; justify-content:space-between; padding:22px;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    cursor:pointer; min-height:120px; color:var(--text);
    transition:transform .1s ease, border-color .2s ease, background .2s ease;
  }
  .drink:active{ transform:scale(.96); border-color:var(--gold); background:var(--surface-2); }
  /* Vollflächiges Getränke-Foto als Kartenhintergrund (randlos) */
  .drink.has-img{ padding:18px; }
  .drink .dbg{ position:absolute; inset:10px; z-index:0; background-size:contain; background-position:center; background-repeat:no-repeat; }
  .drink[data-img]::before{ content:''; position:absolute; inset:10px; z-index:0; background-size:contain; background-position:center; background-repeat:no-repeat; }
  .drink .dover{ position:absolute; inset:0; z-index:1; background:linear-gradient(to bottom,
      rgba(8,18,38,.5) 0%, rgba(8,18,38,0) 28%, rgba(8,18,38,0) 60%, rgba(8,18,38,.82) 100%); }
  .drink.has-img:active{ background:var(--surface); }
  .drink.has-img:active .dbg{ filter:brightness(1.08); }
  /* Emoji-Variante (für eigene Getränke ohne Bild) */
  .drink .dicon{ line-height:1; position:relative; z-index:2; }
  .drink .dicon .demoji{ font-size:40px; filter:drop-shadow(0 4px 10px rgba(0,0,0,.45)); }
  .drink .dicon .dimg{ width:76px; height:76px; object-fit:cover; border-radius:14px; box-shadow:0 6px 18px rgba(0,0,0,.5); }
  .drink .name{ position:relative; z-index:2; font-family:"Bricolage Grotesque"; font-weight:700;
    font-size:24px; line-height:1.05; margin-top:4px; }
  .drink.has-img .name{ text-shadow:0 2px 10px rgba(0,0,0,.7); }
  .drink.has-img .price{ position:relative; z-index:2; text-shadow:0 2px 10px rgba(0,0,0,.7); }
  .drink.has-img .price::after{ -webkit-text-fill-color:#cdd6e6; }
  /* Pfand-Hinweis auf der Karte */
  .drink .pfandtag{ position:relative; z-index:2; align-self:flex-start; margin-top:6px;
    font-size:13px; font-weight:700; color:var(--gold); background:rgba(255,197,41,.18);
    border:1px solid rgba(255,197,41,.4); padding:2px 9px; border-radius:8px; }
  .drink.has-img .pfandtag{ text-shadow:0 1px 4px rgba(0,0,0,.6); }
  /* Pfand-Zeile im Bestell-Panel */
  .pfandline{ margin:8px 14px 0; padding:11px 16px; border-radius:12px;
    background:rgba(255,197,41,.1); border:1px solid rgba(255,197,41,.28);
    display:flex; justify-content:space-between; align-items:center;
    color:var(--gold); font-weight:700; font-size:15px; }
  /* Leergut-/Pfand-Rückgabe: Becher-Zähler */
  .pfand-counter{ display:flex; align-items:center; justify-content:center; gap:16px; }
  .pfand-step{ width:52px; height:52px; border-radius:14px; border:1px solid var(--green);
    background:rgba(43,210,126,.16); color:var(--green); font-size:28px; font-weight:800;
    line-height:1; cursor:pointer; flex-shrink:0; transition:transform .1s ease, background .2s ease; }
  .pfand-step:active{ transform:scale(.92); background:rgba(43,210,126,.32); }
  .pfand-count{ min-width:72px; text-align:center; display:flex; flex-direction:column; gap:1px; }
  .pfand-count b{ font-family:"Bricolage Grotesque"; font-weight:800; font-size:26px; line-height:1; color:var(--green); }
  .pfand-count small{ font-size:11px; color:var(--muted); }
  .drink .price{
    align-self:flex-start; margin-top:auto;
    font-family:"Bricolage Grotesque"; font-weight:800; font-size:30px; letter-spacing:-1px;
    background:linear-gradient(135deg,var(--gold),var(--gold-2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .drink .price::after{ content:" €"; font-size:16px; -webkit-text-fill-color:var(--muted); }

  .order{
    width:400px; flex-shrink:0; min-width:0; background:rgba(255,255,255,.03);
    border-left:1px solid var(--border); display:flex; flex-direction:column;
    overflow:hidden;
  }
  /* Scrollbereich: Positionen + Pfand scrollen zusammen; Summe/Aktionen bleiben fix */
  .order-scroll{ flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; }
  .order h2{
    font-family:"Bricolage Grotesque"; font-weight:700; font-size:19px;
    padding:18px 22px 14px; display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .order h2 .badge{ font-size:14px; font-weight:600; padding:3px 12px; border-radius:8px;
    background:var(--surface-2); border:1px solid var(--border); }
  .editing-banner{
    display:none; margin:0 16px 6px; padding:10px 14px; border-radius:12px;
    background:rgba(255,197,41,.14); border:1px solid var(--gold); color:var(--gold);
    font-weight:700; font-size:14px; align-items:center; justify-content:space-between; gap:10px;
  }
  .editing-banner.show{ display:flex; }
  .editing-banner button{ background:none; border:none; color:var(--gold); font-weight:700;
    text-decoration:underline; cursor:pointer; font-size:14px; }
  .items{ padding:6px 14px; display:flex; flex-direction:column; gap:9px; }
  .empty{ color:var(--muted); text-align:center; margin-top:48px; font-size:15px; }
  .item{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px;
  }
  .item .qty{ font-family:"Bricolage Grotesque"; font-weight:700; font-size:18px; min-width:44px; text-align:center;
    color:var(--ink); background:linear-gradient(135deg,var(--gold),var(--gold-2)); border-radius:9px; padding:4px 0; }
  .item .iname{ flex:1; font-weight:600; font-size:17px; display:flex; flex-direction:column; }
  .item .ipfand{ font-size:12px; font-weight:600; color:var(--gold); margin-top:2px; }
  .item .sum{ font-family:"Bricolage Grotesque"; font-weight:700; font-size:17px; }
  .item .rm{ width:38px; height:38px; border:1px solid var(--border); border-radius:10px;
    background:var(--surface); color:var(--text); font-size:24px; cursor:pointer; line-height:1; }
  .item .rm:active{ background:var(--red); border-color:var(--red); color:#fff; }
  .total{ flex-shrink:0; margin:8px 14px 0; padding:18px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); display:flex; justify-content:space-between; align-items:baseline; }
  .total .label{ font-family:"Bricolage Grotesque"; font-weight:600; font-size:17px; color:var(--muted); }
  .total .value{ font-family:"Bricolage Grotesque"; font-weight:800; font-size:42px; letter-spacing:-1.5px; }
  .total .value::after{ content:" €"; font-size:20px; color:var(--muted); }
  .actions{ flex-shrink:0; padding:14px; display:flex; gap:10px; }
  .actions .clear{ width:120px; }
  .actions .send{ flex:1; }

  .flash{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(80px);
    background:var(--green); color:#06120b; font-family:"Bricolage Grotesque"; font-weight:700;
    padding:14px 26px; border-radius:14px; font-size:18px; z-index:60; opacity:0;
    box-shadow:0 14px 40px rgba(43,210,126,.4); transition:transform .25s ease, opacity .25s ease;
  }
  .flash.show{ transform:translateX(-50%) translateY(0); opacity:1; }

  /* ---- Overlay: Letzte Bestellungen ---- */
  .overlay{ position:fixed; inset:0; z-index:50; display:none;
    background:rgba(5,12,24,.74); backdrop-filter:blur(8px); padding:24px; }
  .overlay.show{ display:flex; align-items:center; justify-content:center; }
  .recent-box{ width:min(620px,94vw); max-height:86vh; display:flex; flex-direction:column;
    background:var(--navy-2); border:1px solid var(--border-2); border-radius:var(--radius);
    box-shadow:0 30px 80px rgba(0,0,0,.5); overflow:hidden; }
  .recent-box .rh{ display:flex; align-items:center; justify-content:space-between;
    padding:18px 22px; border-bottom:1px solid var(--border); }
  .recent-box .rh h3{ font-family:"Bricolage Grotesque"; font-weight:700; font-size:21px; }
  .recent-list{ overflow:auto; padding:14px 18px; display:flex; flex-direction:column; gap:10px; }
  .rorder{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; }
  .rorder .top{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .rorder .rno{ font-family:"Bricolage Grotesque"; font-weight:800; font-size:18px; }
  .rorder .rno::before{ content:"#"; color:var(--gold); }
  .rorder .rtime{ font-size:12px; color:var(--muted); }
  .rorder .rstatus{ font-size:11px; font-weight:700; padding:2px 9px; border-radius:6px; }
  .rorder .rstatus.open{ background:rgba(255,197,41,.16); color:var(--gold); }
  .rorder .rstatus.done{ background:rgba(43,210,126,.16); color:var(--green); }
  .rorder .rseller{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:700; color:var(--gold); background:rgba(255,197,41,.14);
    border:1px solid rgba(255,197,41,.3); padding:2px 9px; border-radius:8px; }
  .rorder .rtotal{ margin-left:auto; font-family:"Bricolage Grotesque"; font-weight:800; font-size:18px; }
  .rorder .ritems{ color:var(--muted); font-size:14px; margin-bottom:12px; }
  .rorder .ract{ display:flex; gap:8px; }
  .rorder .ract .btn{ padding:10px 16px; font-size:15px; }
  .rorder .del{ background:rgba(255,90,71,.14); border:1px solid var(--red); color:var(--red); }
  .recent-empty{ color:var(--muted); text-align:center; padding:40px; }

  /* Tablet: 2 Spalten */
  @media (max-width:1200px){
    .menu{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    .order{ width:320px; }
  }
  /* Tablet/iPad: 2 Spalten, Sidebar rechts */
  @media (max-width:980px){
    .menu{ grid-template-columns:repeat(2,minmax(0,1fr)); padding:16px; gap:14px; }
    .order{ width:300px; }
    .drink{ min-height:140px; }
  }
  /* Hochformat (Handy + Tablet-Portrait): Menü oben, Bestellung unten fixiert,
     Kategorien im Hamburger-Menü */
  @media (max-width:900px){
    .view{ flex-direction:column; }
    /* Hamburger-Zeile */
    .cat-ham{ display:flex; align-items:center; gap:12px; width:100%; flex-shrink:0; cursor:pointer;
      padding:12px 16px; background:var(--surface-2); color:var(--text);
      border:none; border-bottom:1px solid var(--border); font-weight:700; font-size:15px; text-align:left; }
    .cat-ham .cat-ham-label b{ color:var(--gold); }
    /* Kategorien als aufklappbares Dropdown (Standard: zu) */
    .cat-filter{ display:none; flex-direction:column; width:auto; flex-shrink:0;
      max-height:42vh; overflow-y:auto; padding:12px; gap:8px;
      border-right:none; border-bottom:2px solid var(--gold); }
    .cat-filter.open{ display:flex; }
    .cat-filter .cat-btn{ width:100%; text-align:left; white-space:normal; padding:13px 16px; font-size:15px; }
    .menu{ flex:1 1 auto; min-height:0; grid-template-columns:repeat(2,minmax(0,1fr)); padding:14px; gap:12px; }
    /* Bestellung bleibt unten fixiert – Summe + Senden immer sichtbar.
       Nur die Positionsliste (.items) scrollt, Total/Aktionen sind angepinnt. */
    .order{ width:100%; flex:0 0 auto; max-height:46vh; min-height:0; overflow:hidden;
      border-left:none; border-top:2px solid var(--gold); }
    .rb-lbl{ display:none; }
    #recentBtn{ font-size:18px; }
  }
  /* Mobile: 1 Spalte */
  @media (max-width:600px){
    .menu{ grid-template-columns:1fr; padding:12px; gap:10px; }
    .drink{ min-height:110px; padding:14px; }
    .drink .name{ font-size:18px; }
    .drink .price{ font-size:22px; }
    .total .value{ font-size:32px; }
    .order h2{ padding:12px 14px 8px; font-size:17px; }
    .item{ gap:8px; padding:8px 10px; }
    .item .qty{ font-size:16px; }
    .item .iname{ font-size:15px; }
    .item .sum{ font-size:15px; }
  }
  /* Sehr kleine Geräte: Layout anpassungen */
  @media (max-width:400px){
    .menu{ padding:10px; gap:8px; }
    .drink{ min-height:95px; padding:12px; }
    .drink .name{ font-size:16px; }
    .drink .price{ font-size:20px; }
    .cat-filter .cat-btn{ padding:8px 12px; font-size:12px; }
    .order h2{ font-size:16px; }
    .total .value{ font-size:28px; }
    .actions{ padding:10px; gap:8px; }
    .actions .btn{ padding:10px; font-size:13px; }
  }
</style>
</head>
<body class="appbody">

<header class="app">
  <div class="brand"><span id="festName">Straßenfest</span> <span class="sub">/ Kasse</span></div>
  <div class="spacer"></div>
  <button class="logout" id="recentBtn" style="margin-right:4px;"><span aria-hidden="true">🕘</span> <span class="rb-lbl">Letzte Bestellungen</span></button>
  <span class="who" id="whoami"></span>
  <div class="pill"><span class="led"></span> <span class="conn-text">verbunden</span></div>
  <button class="logout" id="logoutBtn">Abmelden</button>
</header>

<main>
  <section class="view">
    <button type="button" class="cat-ham" id="catToggle" aria-expanded="false" aria-controls="catFilter">
      <span class="ham-ic" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="cat-ham-label">Kategorie: <b id="catCurrentLabel">Alle</b></span>
    </button>
    <div class="cat-filter" id="catFilter"></div>
    <div class="menu" id="menu"></div>
    <aside class="order">
      <h2><span id="orderTitle">Bestellung</span> <span class="badge" id="orderCount">0</span></h2>
      <div class="editing-banner" id="editBanner">
        <span id="editText">Bearbeite Bestellung</span>
        <button id="cancelEdit">Abbrechen</button>
      </div>
      <div class="order-scroll">
        <div class="items" id="items"><p class="empty">Getränk antippen, um zu starten</p></div>
        <div class="pfandline" id="pfandLine" style="display:none;"><span>davon Pfand</span><span id="pfandSum">0,00 €</span></div>
        <div class="pfandline" id="pfandReturnLine" style="display:none; background:rgba(43,210,126,.1); border-color:rgba(43,210,126,.28); color:var(--green); flex-direction:column; gap:8px; padding:12px 14px;">
          <div style="display:flex; justify-content:space-between; align-items:center; font-size:14px;">
            <span style="font-weight:700;">Leergut zurück</span>
            <span id="pfandReturnSum" style="font-family:'Bricolage Grotesque'; font-weight:800; font-size:16px;">-0,00 €</span>
          </div>
          <div class="pfand-counter">
            <button type="button" id="pfandMinus" class="pfand-step" aria-label="weniger">−</button>
            <div class="pfand-count"><b id="pfandReturnCount">0</b><small id="pfandReturnUnit">Becher</small></div>
            <button type="button" id="pfandPlus" class="pfand-step" aria-label="mehr">+</button>
          </div>
          <div id="pfandReturnCalc" style="text-align:center; font-size:12px; opacity:.75; min-height:14px;"></div>
        </div>
      </div>
      <div class="total"><span class="label">Summe</span><span class="value" id="total">0,00</span></div>
      <div class="actions">
        <button class="btn ghost clear" id="clearBtn">Leeren</button>
        <button class="btn gold send" id="sendBtn" disabled>Senden</button>
      </div>
    </aside>
  </section>
</main>

<!-- Overlay: letzte Bestellungen -->
<div class="overlay" id="recentOverlay">
  <div class="recent-box">
    <div class="rh">
      <h3>🕘 Letzte Bestellungen (heute)</h3>
      <button class="logout" id="closeRecent">Schließen</button>
    </div>
    <div class="recent-list" id="recentList"><p class="recent-empty">Wird geladen …</p></div>
  </div>
</div>

<div class="flash" id="flash">Bestellung gesendet ✓</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/kasse.js"></script>
<script>
// Fix für Bilder-Laden
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(() => {
    document.querySelectorAll('.drink').forEach(drink => {
      const img = drink.querySelector('img');
      if (img && img.src) {
        const src = img.src;
        const hasImage = (src && !src.includes('undefined'));
        if (hasImage) {
          drink.classList.add('has-img');
          const bg = drink.querySelector('.dbg');
          if (bg) bg.style.backgroundImage = `url('${src}')`;
        }
      }
    });
  }, 100);
});
</script>
</body>
</html>
